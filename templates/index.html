<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Site</title>
    <style>
        body { 
            background-color: #f0f2f5; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center; 
            max-width: 400px; 
        }
        h1 { color: #1877f2; margin-bottom: 1rem; }
        p { color: #606770; line-height: 1.6; }
        .btn { 
            display: inline-block; 
            margin-top: 1.5rem; 
            padding: 0.8rem 1.5rem; 
            background: #1877f2; 
            color: white; 
            text-decoration: none; 
            border-radius: 7px; 
            font-weight: bold;
        }
        .btn:hover { background: #166fe5; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Olá, Mundo!</h1>
        <p>Este é o meu primeiro site oficial desenvolvido com <strong>Python e Flask</strong>.</p>
        <p>Agora o visual está organizado e profissional!</p>
        <a href="https://flask.palletsprojects.com/" target="_blank" class="btn">Saiba Mais sobre Flask</a>
    </div>
</body>
</html>
